services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            target: prod
        restart: unless-stopped
        ports:
            - ${PORT}:${PORT}
        environment:
            APP_ENV: ${APP_ENV}
            PORT: ${PORT}
            ALLOW_ORIGINS: ${ALLOW_ORIGINS}
            DB_HOST: ${DB_HOST}
            DB_PORT: ${DB_PORT}
            DB_DATABASE: ${DB_DATABASE}
            DB_USERNAME: ${DB_USERNAME}
            DB_PASSWORD: ${DB_PASSWORD}
            DB_SCHEMA: ${DB_SCHEMA}
            VALKEY_HOST: ${VALKEY_HOST}
            VALKEY_PORT: ${VALKEY_PORT}
            LIMITER_RPS: ${LIMITER_RPS}
            LIMITER_BURST: ${LIMITER_BURST}
        depends_on:
            db:
                condition: service_healthy
            valkey:
                condition: service_healthy
        networks:
            - app_network
    db:
        image: postgres:17.7
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        ports:
            - "${DB_PORT}:5432"
        volumes:
            - db_volume:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "sh -c 'pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}'",
                ]
            interval: 5s
            timeout: 5s
            retries: 3
            start_period: 15s
        networks:
            - app_network
    valkey:
        image: valkey/valkey:9.1-alpine3.23
        restart: unless-stopped
        ports:
            - "${VALKEY_PORT}:6379"
        volumes:
            - ./valkey.conf:/etc/valkey/valkey.conf
        command: valkey-server /etc/valkey/valkey.conf
        healthcheck:
            test: ["CMD-SHELL", "valkey-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 3
            start_period: 15s
        networks:
            - app_network
    otel-collector:
        image: otel/opentelemetry-collector-contrib:0.149.0
        command: ["--config=/etc/otel-collector-config.yml"]
        container_name: otel-collector
        ports:
            - "4317:4317" # OTLP gRPC receiver
            - "13133:13133" # health_check extension
            - "55679:55679" # ZPages extension; see more here: https://opentelemetry.io/docs/collector/install/docker/#docker-compose
        environment:
            GRAFANA_CLOUD_OTLP_ENDPOINT: ${GRAFANA_CLOUD_OTLP_ENDPOINT}
            GRAFANA_CLOUD_INSTANCE_ID: ${GRAFANA_CLOUD_INSTANCE_ID}
            GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY}
        volumes:
            - ./otel-collector-config.yaml:/etc/otel-collector-config.yml
        networks:
            - app_network

volumes:
    db_volume:
networks:
    app_network:
