receivers:
    otlp:
        protocols:
            grpc:
                endpoint: otel-collector:4317
            http:
                endpoint: otel-collector:4318

processors:
    memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 15

exporters:
    debug:
        verbosity: detailed

extensions:
    health_check:
        endpoint: otel-collector:13133
    zpages:
        endpoint: otel-collector:55679

service:
    extensions: [health_check, zpages]
    pipelines:
        traces:
            receivers: [otlp]
            processors: [memory_limiter]
            exporters: [debug]
        metrics:
            receivers: [otlp]
            processors: [memory_limiter]
            exporters: [debug]
        logs:
            receivers: [otlp]
            processors: [memory_limiter]
            exporters: [debug]
